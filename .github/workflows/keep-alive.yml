name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 * * *'   # joka päivä klo 8 UTC
  workflow_dispatch:          # mahdollistaa manuaalisen ajon

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/settings?select=key&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Ping epäonnistui!"
            exit 1
          fi
          echo "Supabase hereillä ✓"

      - name: Keepalive upsert Supabaseen
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/settings" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d '{"key":"keepalive","value":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}')
          echo "Upsert status: $STATUS"
          if [[ "$STATUS" != "200" && "$STATUS" != "201" ]]; then
            echo "Epäonnistui! Status: $STATUS"
            exit 1
          fi
          echo "Keepalive kirjoitettu ✓"

      - name: Keepalive SQL Supabaseen
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/keepalive_ping" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "SQL status: $STATUS"
          echo "Keepalive valmis ✓"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Asenna Puppeteer
        run: npm install puppeteer

      - name: Kirjaudu sisään ja pingaa
        run: node keepalive.js
        env:
          APP_URL: https://heikki-john.github.io/pelipaita/index.html
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
